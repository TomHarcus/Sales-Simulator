<!DOCTYPE html>
<html lang="en-US">
    <head>
        <link href="styles/style.css" rel="stylesheet" />
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Sales Simulator</title>
    </head>
    <body>
        <div class="start_wrapper">
        <div class="start_title">
            <p>Sales Simulator</p>
        </div>
        <div class="start_state">
            
            <form id="start_form">
                <label for="description">Context description:</label>
                <input type="text" id="description" name="description" placeholder="Description..."><br><br>

                <label for="personality">Personality:</label>
                <input type="text" id="personality" name="personality" placeholder="Personality..."><br><br>

                <label for="difficulty">Difficulty:</label>
                <select id="customer_type" name="customer_type">
                    <option value="easy">Easy</option>
                    <option value="normal">Normal</option>
                    <option value="hard">Hard</option>
                </select><br><br>

                <label for="interest_level">Interest level:</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                <input type="range" id="interest_level" name="interest_level" min="1" max="5" 
                    oninput="document.getElementById('interest_val').textContent = this.value">
                <span id="interest_val">3</span>
                </div>
                
                <input type="submit" value="Start Simulator">
            </form>
        </div>
        </div>

        <div class="active_session">
            <div class="parent">
                <div class="left">
                    <div class="messages-wrapper">
                    <div class="messages">
                        
                        
                    </div>
                    </div>
                    <div class="compose">
                    <input type="text" id="user_message" name="user_message" placeholder="Send message...">
                    <button id="send_button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send-horizontal-icon lucide-send-horizontal"><path d="M3.714 3.048a.498.498 0 0 0-.683.627l2.843 7.627a2 2 0 0 1 0 1.396l-2.842 7.627a.498.498 0 0 0 .682.627l18-8.5a.5.5 0 0 0 0-.904z"/><path d="M6 12h16"/></svg>
                    </button>
                    </div>

                </div>
                
                <div class="right">
                    <div class="information">
                        <p class="classification_label">Classification</p>
                        <p class="info-value">N/A</p>
                        <p class="objection-label">Current objection</p>
                        <p class="current_objection">No current objection</p>
                        <p class="info-label">Interest Level</p>
                        <div class="interest-dots">
                            <span class="dot active"></span>
                            <span class="dot active"></span>
                            <span class="dot active"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                        <p class="number_turns_label">Number of turns</p>
                        <p class="number_turns">0</p>
                    </div>
                    <input id="end_session" type="submit" value="End Session">
                </div>
            </div>
        </div>

        <div class="finish_session">
            <h2 class="finish_title">SESSION COMPLETE</h2>
            <div class="finish_columns">
                <div class="finish_left">
                
                </div>
           
                <div class="finish_right">

                </div>
            </div>
            
            <button id="restart_button">Start New Session</button>
        </div>
        <script src="scripts/main.js"></script>
    </body>
</html>
