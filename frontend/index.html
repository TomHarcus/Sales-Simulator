<!DOCTYPE html>
<html lang="en-US">
    <head>
        <link href="styles/style.css" rel="stylesheet" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Sales Simulator</title>
    </head>
    <body>
        <div class="start_state">
            <form>
                <label for="description">Project Description:</label>
                <input type="text" id="description" name="description" placeholder="Description..."><br><br>

                <label for="personality">Personality:</label>
                <input type="text" id="personality" name="personality" placeholder="Personality..."><br><br>

                <label for="difficulty">Difficulty:</label>
                <select id="customer_type" name="customer_type">
                    <option value="easy">Easy</option>
                    <option value="normal">Normal</option>
                    <option value="hard">Hard</option>
                </select><br><br>

                <label for="interest_level">Interest level (between 1 and 5):</label>
                <input type="range" id="interest_level" name="interest_level" min="1" max="5"><br><br>
                
                <input type="submit" value="Start Simulator">
            </form>
        </div>

        <div class="active_session">
            <div class="parent">
                <div class="left">
                    <div class="messages">
                        <div class="message prospect">Hi, thanks for calling: what's this about?</div>
                        <div class="message user">I wanted to talk about our software solution...</div>
                        <div class="message prospect">We already have a vendor for that.</div>
                        <div class="message user">I understand, but let me ask...</div>
                    </div>
                    <div class="compose">
                    <input type="text" id="user_message" name="user_message" placeholder="Send message...">
                    <button id="send_button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send-horizontal-icon lucide-send-horizontal"><path d="M3.714 3.048a.498.498 0 0 0-.683.627l2.843 7.627a2 2 0 0 1 0 1.396l-2.842 7.627a.498.498 0 0 0 .682.627l18-8.5a.5.5 0 0 0 0-.904z"/><path d="M6 12h16"/></svg>
                    </button>
                    </div>

                </div>
                
                <div class="right">
                    <div class="information">
                        <p class="info-label">Classification</p>
                        <p class="info-value">Objection Handling</p>
                        <p class="info-label">Interest Level</p>
                        <div class="interest-dots">
                            <span class="dot active"></span>
                            <span class="dot active"></span>
                            <span class="dot active"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                    </div>
                    <input type="submit" value="End Session">
                </div>
            </div>
        </div>

        <div class="finish_session">
            <h2>Session Summary</h2>
            <div class="score-row">
                <span class="score-label">Weak Concessive</span>
                <span class="score-count">3</span>
            </div>
            <div class="score-row">
                <span class="score-label">Objection Handling</span>
                <span class="score-count">5</span>
            </div>
            <div class="score-row">
                <span class="score-label">Feature Dumping</span>
                <span class="score-count">1</span>
            </div>
            <div class="score-row">
                <span class="score-label">Anchoring</span>
                <span class="score-count">2</span>
            </div>
            <button id="restart_btn">Start New Session</button>
        </div>

    </body>
</html>
