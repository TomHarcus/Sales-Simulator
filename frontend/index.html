<!DOCTYPE html>
<html lang="en-US">
    <head>
        <link href="styles/style.css" rel="stylesheet" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Sales Simulator</title>
    </head>
    <body>
        <div class="start_state">
            <form>
                <label for="description">Project Description:</label>
                <input type="text" id="description" name="description" placeholder="Description..."><br><br>

                <label for="personality">Personality:</label>
                <input type="text" id="personality" name="personality" placeholder="Personality..."><br><br>

                <label for="difficulty">Difficulty:</label>
                <select id="customer_type" name="customer_type">
                    <option value="easy">Easy</option>
                    <option value="normal">Normal</option>
                    <option value="hard">Hard</option>
                </select><br><br>

                <label for="interest_level">Interest level (between 1 and 5):</label>
                <input type="range" id="interest_level" name="interest_level" min="1" max="5"><br><br>
                
                <input type="submit" value="Start Simulator">
            </form>
        </div>

        <div class="active_session">
            <div class="parent">
                <div class="left">
                    <div class="messages">
                        <div class="message prospect">Hi, thanks for calling — what's this about?</div>
                        <div class="message user">I wanted to talk about our software solution...</div>
                        <div class="message prospect">We already have a vendor for that.</div>
                        <div class="message user">I understand, but let me ask...</div>
                    </div>
                    <label for="user_message">Send a message</label>
                    <input type="text" id="user_message" name="user_message">
                    <h1>This is the left</h1>
                </div>
                
                <div class="right">
                    <p>Classification:</p>
                </div>
            </div>
        </div>

        <div class="finish_session">
            <p>test 3</p>
        </div>

    </body>
</html>
